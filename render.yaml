services:
  # BACKEND (Laravel)
  - type: web
    name: lavasys-backend
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile.render
    plan: starter
    autoDeploy: true
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: CACHE_STORE
        value: redis
      - key: SESSION_DRIVER
        value: redis
      - key: REDIS_CLIENT
        value: phpredis
      - key: REDIS_HOST
        fromService:
          type: redis
          name: lavasys-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: lavasys-redis
          property: port
      - key: FRONTEND_URL
        sync: false

  # WORKER (SEM startCommand ❗)
  - type: worker
    name: lavasys-queue
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile.render
    plan: starter
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        sync: false
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: CACHE_STORE
        value: redis
      - key: SESSION_DRIVER
        value: redis
      - key: REDIS_CLIENT
        value: phpredis
      - key: REDIS_HOST
        fromService:
          type: redis
          name: lavasys-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: lavasys-redis
          property: port

  # REDIS (corrigido)
  - type: redis
    name: lavasys-redis
    plan: starter
    ipAllowList: []   # 🔥 permite acesso interno
    maxmemoryPolicy: allkeys-lru

  # FRONTEND
  - type: web
    name: lavasys-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
